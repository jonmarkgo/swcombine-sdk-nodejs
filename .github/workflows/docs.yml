name: Generate Docs

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'typedoc.json'
      - 'scripts/generate-mintlify.ts'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # TypeDoc markdown → Mintlify resource pages
      - run: npm run docs

      - name: Commit generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mintlify/resources/
          if git diff --staged --quiet; then
            echo "No docs changes to commit"
          else
            git commit -m "docs: regenerate from JSDoc [skip ci]"
            git push
          fi
